name: Update Stock Data

on:
  schedule:
    # 08:00 UTC = 16:00 北京时间，周一至周五（A股工作日）
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TASK3/src/**'
      - 'TASK4/src/**'
      - 'requirements.txt'
      - '.github/workflows/update-data.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build TASK3 (fetch data + dashboard)
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python TASK3/src/build_task3.py

      - name: Build TASK4 (turtle dashboard, depends on TASK3 raw data)
        run: python TASK4/src/build_task4_html.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COMMIT_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M Beijing')
            git commit -m "chore: auto-update stock data ($COMMIT_DATE)"
            git push
          fi
